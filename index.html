<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dota Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Dota Predictor</h1>
        
        <!--  Выбор команды -->
        <div id="step1" class="step active">
            <div class="team-selector">
                <input type="text" id="teamInput" class="input-field" placeholder="Введите название команды...">
                <button id="findTeamBtn" class="action-button">Найти команду</button>
            </div>
            <div id="teamError" class="error-message"></div>
        </div>
        
        <!-- Ввод героев для игроков -->
        <div id="step2" class="step">
            <h2 class="team-name" id="selectedTeamName"></h2>
            <div id="playersContainer" class="players-container"></div>
            <button id="predictBtn" class="predict-button">Предсказать</button>
        </div>
        
        <!-- Результат -->
        <div id="result" class="result-container"></div>
        
        <!-- Кнопка "Назад" -->
        <button id="backBtn" class="back-button">← Назад</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
